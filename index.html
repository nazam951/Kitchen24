<div class="payment-card">
    <h3 id="statusTitle">2. Checkout</h3>
    <div id="orderCodeBox" style="display:none; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:15px;">
        <span style="font-size:0.8rem; opacity:0.8;">YOUR ORDER CODE:</span><br>
        <strong id="displayCode" style="font-size:1.2rem; color:#fff; letter-spacing:2px;"></strong>
    </div>
    
    <div class="price">₹1</div>
    
    <button class="btn-pay" id="payBtn" onclick="triggerUPI()">STEP 1: PAY VIA UPI</button>
    
    <p style="font-size:0.8rem; margin:10px 0;">THEN</p>
    <button class="btn-wa" onclick="sendToWA()">STEP 2: CONFIRM WHATSAPP</button>
</div>

<script>
    let generatedCode = "";

    function generateCode() {
        if (!generatedCode) {
            generatedCode = "K24-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('displayCode').innerText = generatedCode;
            document.getElementById('orderCodeBox').style.display = 'block';
            document.getElementById('statusTitle').innerText = "Order Generated";
        }
        return generatedCode;
    }

    function triggerUPI() {
        const orderID = generateCode();
        const upiId = "8801712328@apl";
        const amount = "1"; 
        const note = "Kitchen24 Order " + orderID;

        const upiUrl = `upi://pay?pa=${upiId}&pn=Kitchen24&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

        window.location.href = upiUrl;

        setTimeout(() => {
            alert("If UPI apps didn't open, please pay manually to " + upiId + " with Note: " + orderID);
        }, 2500);
    }

    function findMe() {
        const b = document.getElementById('lBtn');
        const d = document.getElementById('gpsDisplay');
        if (navigator.geolocation) {
            b.innerText = "Locating...";
            navigator.geolocation.getCurrentPosition((p) => {
                d.value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
                b.innerText = "✅ Location Pinned";
            }, () => {
                alert("Please enable Location.");
                b.innerText = "📍 Pin Current Location";
            });
        }
    }

    function sendToWA() {
        const n = document.getElementById('custName').value;
        const a = document.getElementById('custAddr').value;
        const g = document.getElementById('gpsDisplay').value;
        const orderID = generatedCode || "NOT_GENERATED";
        const phone = "918801712328";

        if(!n || !a) { alert("Fill Details First!"); return; }

        let gLink = g ? `https://www.google.com/maps?q=${g}` : "No Location";
        
        const msg = `*ORDER CONFIRMED: ${orderID}*%0A%0A` +
                    `*Name:* ${n}%0A` +
                    `*Address:* ${a}%0A` +
                    `*📍 Google Maps:* ${gLink}%0A%0A` +
                    `Payment done for ${orderID}. Sending screenshot!`;

        window.open("https://wa.me/" + phone + "?text=" + msg, "_blank");
    }
</script>
