<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen24 Dinner Subscription</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; color: #333; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        header { text-align: center; padding: 20px 0; background: #2d5a27; color: white; border-radius: 0 0 20px 20px; margin: -20px -20px 20px -20px; }
        
        .menu-box { display: flex; overflow-x: auto; gap: 10px; margin: 20px 0; padding-bottom: 10px; }
        .day { min-width: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: center; background: #fff; }
        .friday { border: 2px solid #d32f2f; background: #fff5f5; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .loc-btn { width: 100%; padding: 12px; background: #e8f5e9; color: #2d5a27; border: 1px dashed #2d5a27; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .pay-section { background: #1a1a1a; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .price { font-size: 2.5rem; font-weight: 800; margin: 10px 0; }
        
        .btn-pay { display: block; background: #2d5a27; color: white; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
        .btn-wa { width: 100%; border: none; background: #25D366; color: white; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .order-id-display { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0;">Kitchen24</h1>
        <p style="margin:5px 0; opacity:0.8;">Premium Dinner Subscription</p>
    </header>

    <h3>Weekly Menu (Mon-Sat)</h3>
    <div class="menu-box">
        <div class="day">Mon<br><small>Veg</small></div>
        <div class="day">Tue<br><small>Veg</small></div>
        <div class="day">Wed<br><small>Veg</small></div>
        <div class="day">Thu<br><small>Veg</small></div>
        <div class="day friday">Fri<br><small style="color:#d32f2f">Feast</small></div>
        <div class="day">Sat<br><small>Veg</small></div>
    </div>

    <hr>

    <h3>1. Delivery Details</h3>
    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="cName" placeholder="Enter name">
    </div>
    <div class="input-group">
        <label>Delivery Address</label>
        <textarea id="cAddr" rows="2" placeholder="House No, Building, Area..."></textarea>
    </div>
    <div class="input-group">
        <button class="loc-btn" onclick="getGPS()" id="lBtn">📍 Pin My Location</button>
        <input type="text" id="gpsCoord" readonly placeholder="GPS Coordinates will appear here" style="margin-top:5px; font-size:0.8rem; background:#eee;">
    </div>

    <div class="pay-section">
        <div id="idBox" class="order-id-display">
            Code: <span id="idVal"></span>
        </div>
        <div class="price">₹1</div>
        <a href="javascript:void(0)" class="btn-pay" onclick="doPay()">STEP 1: PAY VIA UPI</a>
        <p style="margin:10px 0; font-size:0.8rem;">THEN</p>
        <button class="btn-wa" onclick="doWA()">STEP 2: CONFIRM ON WHATSAPP</button>
    </div>

    <p style="text-align:center; font-size:0.7rem; color:#888; margin-top:20px;">
        © 2026 Kitchen24 Dinner Service | Hyderabad
    </p>
</div>

<script>
    let myOrderID = "";

    function makeID() {
        if(!myOrderID) {
            myOrderID = "K24-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('idVal').innerText = myOrderID;
            document.getElementById('idBox').style.display = 'block';
        }
        return myOrderID;
    }

    function getGPS() {
        const b = document.getElementById('lBtn');
        const i = document.getElementById('gpsCoord');
        if (navigator.geolocation) {
            b.innerText = "Locating...";
            navigator.geolocation.getCurrentPosition((p) => {
                i.value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
                b.innerText = "✅ Location Pinned";
            }, () => {
                alert("Please enable GPS");
                b.innerText = "📍 Pin My Location";
            });
        }
    }

    function doPay() {
        const id = makeID();
        const upi = "8801712328@apl";
        const note = encodeURIComponent("Kitchen24 Order " + id);
        // Using window.location to trigger the app
        window.location.href = `upi://pay?pa=${upi}&pn=Kitchen24&am=1&cu=INR&tn=${note}`;
    }

    function doWA() {
        const n = document.getElementById('cName').value;
        const a = document.getElementById('cAddr').value;
        const g = document.getElementById('gpsCoord').value;
        const id = myOrderID || "NEW";
        
        if(!n || !a) { alert("Please enter name and address!"); return; }

        let maps = g ? `https://www.google.com/maps?q=${g}` : "Not Pinned";
        
        const text = `*ORDER: ${id}*%0A*Name:* ${n}%0A*Address:* ${a}%0A*📍 Location:* ${maps}%0A%0A*Paid ₹1 for order ${id}*`;
        
        window.open(`https://wa.me/918801712328?text=${text}`, '_blank');
    }
</script>

</body>
</html>
